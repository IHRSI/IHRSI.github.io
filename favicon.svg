<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Light background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#F5F0E8" />
    </linearGradient>
    
    <!-- Deep Pine to Teal Accent Gradient -->
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E3A2F" />
      <stop offset="100%" stop-color="#3AAFA9" />
    </linearGradient>
    
    <!-- Subtle soft shadow for light background -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#1E3A2F" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Base background shape -->
  <rect width="512" height="512" rx="128" fill="url(#bg)" />

  <!-- Outer gradient stroke -->
  <rect x="24" y="24" width="464" height="464" rx="104" fill="none" stroke="url(#accent)" stroke-width="12" opacity="0.4" />
  
  <!-- Mountain graphic (Expedition theme) -->
  <path d="M 256 120 L 80 400 L 432 400 Z" fill="none" stroke="url(#accent)" stroke-width="16" stroke-linejoin="round" opacity="0.15" />
  <path d="M 256 200 L 140 370 L 372 370 Z" fill="none" stroke="url(#accent)" stroke-width="12" stroke-linejoin="round" opacity="0.3" />
  <path d="M 256 260 L 190 350 L 322 350 Z" fill="none" stroke="url(#accent)" stroke-width="8" stroke-linejoin="round" opacity="0.7" />

  <!-- Monogram text (Increased size, changed to premium serif font) -->
  <text x="256" y="325" font-family="'Cinzel', 'Georgia', serif" font-weight="700" font-size="190" fill="#1E3A2F" text-anchor="middle" letter-spacing="4" filter="url(#shadow)">HRS</text>
  
  <!-- Decorative dot -->
  <circle cx="256" cy="410" r="12" fill="url(#accent)" filter="url(#shadow)" />
</svg>
