<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Base background shape -->
  <rect width="512" height="512" rx="128" fill="url(#bg)" />

  <!-- Outer gradient stroke -->
  <rect x="24" y="24" width="464" height="464" rx="104" fill="none" stroke="url(#accent)" stroke-width="12" opacity="0.2" />
  
  <!-- Mountain graphic (Expedition theme) -->
  <path d="M 256 120 L 80 400 L 432 400 Z" fill="none" stroke="url(#accent)" stroke-width="16" stroke-linejoin="round" opacity="0.15" />
  <path d="M 256 200 L 140 370 L 372 370 Z" fill="none" stroke="url(#accent)" stroke-width="12" stroke-linejoin="round" opacity="0.3" />
  <path d="M 256 260 L 190 350 L 322 350 Z" fill="none" stroke="url(#accent)" stroke-width="8" stroke-linejoin="round" opacity="0.6" />

  <!-- Monogram text -->
  <text x="256" y="310" font-family="'Inter', system-ui, -apple-system, sans-serif" font-weight="900" font-size="130" fill="#ffffff" text-anchor="middle" letter-spacing="6" filter="url(#shadow)">HRS</text>
  
  <!-- Decorative glowing dot -->
  <circle cx="256" cy="380" r="10" fill="#00f2fe" filter="url(#shadow)" />
</svg>
